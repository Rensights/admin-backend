spring:
  application:
    name: rensights-admin-backend
  
  # Primary admin database configuration
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/admin_db_dev}
    username: ${DATABASE_USER:admin}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      max-lifetime: 600000
      idle-timeout: 300000
      data-source-properties:
        sslmode: require
  
  # JPA Configuration - disabled auto-configuration since we use custom datasources
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    # SECURITY FIX: Disable SQL logging in production (prevents sensitive data exposure)
    show-sql: false
    open-in-view: false
  
  # SECURITY: Request size limits to prevent DoS attacks
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8081}
  # SECURITY: Request size limits to prevent DoS attacks
  max-http-header-size: 8KB

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

jwt:
  secret: ${JWT_SECRET:admin-secret-key-change-in-production-minimum-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}
  cookie:
    max-age: ${JWT_COOKIE_MAX_AGE:86400}        # seconds — must match JWT expiration (86400 s = 24 h)
    secure: ${JWT_COOKIE_SECURE:true}            # set to false only for local HTTP dev
    same-site: ${JWT_COOKIE_SAME_SITE:strict}    # strict, lax, or none
    path: ${JWT_COOKIE_PATH:/}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3001,http://localhost:3002}

admin:
  default-email: ${ADMIN_DEFAULT_EMAIL:admin@rensights.com}
  default-password: ${ADMIN_DEFAULT_PASSWORD:}

app:
  main-backend-url: ${APP_MAIN_BACKEND_URL:http://localhost:8080}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
  email:
    enabled: ${EMAIL_ENABLED:true}
  frontend-url: ${APP_FRONTEND_URL:http://localhost:3000}

analysis:
  api:
    url: ${ANALYSIS_API_URL:http://10.42.0.1:8000}

# Microsoft Graph API configuration (shared credentials with app-backend)
microsoft:
  graph:
    tenant-id: ${MICROSOFT_TENANT_ID:}
    client-id: ${MICROSOFT_CLIENT_ID:}
    client-secret: ${MICROSOFT_CLIENT_SECRET:}
    from-email: ${MICROSOFT_FROM_EMAIL:no-reply@rensights.com}

resilience4j:
  circuitbreaker:
    instances:
      microsoft-graph:
        sliding-window-size: 5
        failure-rate-threshold: 60
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  publishable-key: ${STRIPE_PUBLISHABLE_KEY:}

logging:
  level:
    root: INFO
    com.rensights.admin: DEBUG
    # SECURITY FIX: Disable SQL logging to prevent sensitive data exposure
    org.hibernate.SQL: OFF
    org.hibernate.type.descriptor.sql.BasicBinder: OFF
    org.springframework.jdbc.core: OFF
    org.springframework.security: WARN
