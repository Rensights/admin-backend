apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "admin-backend.fullname" . }}
  labels:
    {{- include "admin-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "admin-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        reloader.stakater.com/auto: "true"
        deployment.kubernetes.io/revision: "{{ .Release.Revision }}"
        kubectl.kubernetes.io/restartedAt: "{{ now | date "2006-01-02T15:04:05Z07:00" }}"
        instrumentation.opentelemetry.io/inject-java: "false"
      labels:
        {{- include "admin-backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "admin-backend.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          command: ["/bin/sh", "-c"]
          args:
            - |
              unset JAVA_TOOL_OPTIONS
              unset _JAVA_OPTIONS
              unset JDK_JAVA_OPTIONS
              exec java -jar app.jar
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: SPRING_PROFILES_ACTIVE
            # SERVER_PORT stays chart-derived so it always matches containerPort/probes.
            - name: SERVER_PORT
              value: {{ .Values.service.port | quote }}
            - name: CORS_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: ADMIN_CORS_ORIGINS
            # Primary admin database
            - name: DATABASE_URL
              value: "jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: POSTGRES_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: POSTGRES_PASSWORD
            # Legacy admin-prefixed environment variables for compatibility
            - name: ADMIN_DATABASE_URL
              value: "jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
            - name: ADMIN_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: POSTGRES_USERNAME
            - name: ADMIN_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: POSTGRES_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: JWT_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: STRIPE_SECRET_KEY
            - name: STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: STRIPE_PUBLISHABLE_KEY
            - name: MICROSOFT_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: MICROSOFT_TENANT_ID
            - name: MICROSOFT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: MICROSOFT_CLIENT_ID
            - name: MICROSOFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: MICROSOFT_CLIENT_SECRET
            - name: APP_MAIN_BACKEND_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: ADMIN_APP_MAIN_BACKEND_URL
            - name: APP_RATE_LIMIT_ENABLED
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: ADMIN_RATE_LIMIT_ENABLED
            - name: JWT_COOKIE_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: ADMIN_JWT_COOKIE_SECURE
            - name: APP_FRONTEND_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.sharedConfig }}
                  key: APP_FRONTEND_URL
            # REPORTS_STORAGE_PATH stays chart-derived (matches the PVC mount path).
            - name: REPORTS_STORAGE_PATH
              value: {{ .Values.reports.storage.path | quote }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: reports-storage
              mountPath: {{ .Values.reports.storage.path | quote }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: reports-storage
          {{- if .Values.reports.storage.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.reports.storage.existingClaim | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
