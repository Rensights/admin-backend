# Dev environment overrides for admin-backend
replicaCount: 1

image:
  repository: ghcr.io/rensights/admin-backend
  tag: ""  # Set by CI/CD via --set image.tag=${IMAGE_TAG}
  pullPolicy: Always

# Database configuration

service:
  type: ClusterIP
  port: 8081

# Primary datasource: admin DB.
database:
  host: postgres-admin.dev.svc.cluster.local
  port: 5432
  name: admin_db_dev

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

networkPolicy:
  enabled: true
  analysisApi:
    enabled: true
    cidr: "10.42.0.1/32"
    port: 8000

ingress:
  enabled: true
  className: "kong"
  hosts:
    - host: dev-admin-api.72.62.40.154.nip.io
      paths:
        - path: /
          pathType: Prefix
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/protocols: "http"
    konghq.com/preserve-host: "false"
    konghq.com/connect-timeout: "60000"
    konghq.com/read-timeout: "60000"
    konghq.com/write-timeout: "60000"

secrets:
  dbCredentials: admin-db-credentials
  jwtSecret: jwt-secret
  stripeSecrets: stripe-secrets

extraEnv:
  SPRING_PROFILES_ACTIVE: "dev"
  SERVER_PORT: "8081"
  CORS_ORIGINS: "http://dev-admin.72.62.40.154.nip.io:31416"
APP_MAIN_BACKEND_URL: "http://dev-api.72.62.40.154.nip.io:31416"
  APP_RATE_LIMIT_ENABLED: "true"
  REPORTS_STORAGE_PATH: "/data/reports"

reports:
  storage:
    path: /data/reports
    existingClaim: reports-storage
