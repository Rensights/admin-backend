# Dev environment overrides for admin-backend
replicaCount: 1

image:
  repository: ghcr.io/rensights/admin-backend
  tag: ""  # Set by CI/CD via --set image.tag=${IMAGE_TAG}
  pullPolicy: Always

# Database configuration

service:
  type: ClusterIP
  port: 8081

# Primary datasource: admin DB.
database:
  host: postgres-admin.dev.svc.cluster.local
  port: 5432
  name: admin_db_dev

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

networkPolicy:
  enabled: true
  analysisApi:
    enabled: true
    cidr: "10.42.0.1/32"
    port: 8000

ingress:
  enabled: true
  className: "kong"
  hosts:
    - host: dev-admin-api.72.62.40.154.nip.io
      paths:
        - path: /
          pathType: Prefix
  annotations:
    konghq.com/strip-path: "true"
    konghq.com/protocols: "http"
    konghq.com/preserve-host: "false"
    konghq.com/connect-timeout: "60000"
    konghq.com/read-timeout: "60000"
    konghq.com/write-timeout: "60000"

# All app config comes from the single Portainer-managed `dev-shared-config`
# secret (see chart default secrets.sharedConfig).

# All config now comes from the single Portainer-managed `dev-shared-config` secret
# (SPRING_PROFILES_ACTIVE, ADMIN_CORS_ORIGINS, ADMIN_APP_MAIN_BACKEND_URL,
# ADMIN_RATE_LIMIT_ENABLED, ADMIN_JWT_COOKIE_SECURE, APP_FRONTEND_URL, plus the
# DB/JWT/Stripe/Microsoft secrets). SERVER_PORT is derived from service.port and
# REPORTS_STORAGE_PATH from reports.storage.path (structural, chart-owned).
extraEnv: {}

reports:
  storage:
    path: /data/reports
    existingClaim: reports-storage
